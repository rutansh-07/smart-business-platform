<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Deep premium gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" /> <!-- Violet-500 -->
      <stop offset="50%" stop-color="#3B82F6" /> <!-- Blue-500 -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- Cyan-500 -->
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background with subtle radial gradient in deep mode -->
  <circle cx="256" cy="256" r="230" fill="#030712" stroke="url(#grad)" stroke-width="12" />
  
  <!-- Outer Glow Group for logo lines -->
  <g filter="url(#glow)">
    <!-- Primary Growth Line -->
    <path d="M96,384 L224,256 L320,352 L448,160" 
          stroke="url(#grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Node Dot at the peak -->
    <circle cx="448" cy="160" r="32" fill="#FFFFFF" />
    <circle cx="448" cy="160" r="20" fill="url(#grad)" />

    <!-- Secondary (faded) Growth Line in background -->
    <path d="M96,176 L224,304 L320,208 L448,352" 
          stroke="url(#grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" />
  </g>
</svg>